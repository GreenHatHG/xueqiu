# fly.toml app configuration file generated for xq-rss-flyctl on 2026-03-15T00:01:59+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'xq-rss-flyctl'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  XQ_RSS_TTL_SEC = '300'
  XQ_HTTP_DEBUG = 1

[[mounts]]
  source = 'data'
  destination = '/app/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
